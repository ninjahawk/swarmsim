<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summer Research — Raw Data</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; color: #202124; }

  header {
    background: #188038;
    color: white;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 20px; font-weight: 500; }
  header span { font-size: 13px; opacity: 0.85; }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    background: white;
    border-bottom: 2px solid #e0e0e0;
    padding: 0 32px;
    gap: 0;
  }
  .tab {
    padding: 14px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: #5f6368;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
  }
  .tab:hover { color: #188038; }
  .tab.active { color: #188038; border-bottom-color: #188038; }

  .panel { display: none; padding: 28px 32px; }
  .panel.active { display: block; }

  .toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .toolbar-left h2 { font-size: 16px; font-weight: 600; color: #3c4043; }
  .toolbar-left p  { font-size: 12px; color: #5f6368; margin-top: 4px; max-width: 640px; line-height: 1.5; }

  .btn {
    padding: 8px 20px;
    background: #188038;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .btn:hover { background: #0d652d; }
  .btn-outline {
    background: white;
    color: #188038;
    border: 1px solid #188038;
  }
  .btn-outline:hover { background: #e6f4ea; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    font-size: 13px;
    margin-bottom: 24px;
  }
  thead tr { background: #f1f3f4; }
  th {
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #5f6368;
    border-bottom: 1px solid #e0e0e0;
  }
  td {
    padding: 9px 14px;
    border-bottom: 1px solid #f1f3f4;
    font-variant-numeric: tabular-nums;
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f8f9fa; }
  .num { color: #188038; font-weight: 500; }
  .label-col { color: #3c4043; font-weight: 500; }
  .note-col { color: #5f6368; font-size: 12px; }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #3c4043;
    margin: 20px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #e0e0e0;
  }
  .section-title:first-of-type { margin-top: 0; }

  .meta {
    font-size: 12px;
    color: #5f6368;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .meta strong { color: #3c4043; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Summer Research — Raw Data</h1>
    <span>PHY 351 &nbsp;|&nbsp; Flocking Simulations &nbsp;|&nbsp; Nathan Langley</span>
  </div>
</header>

<div class="tabs" id="tabBar"></div>

<div id="panels"></div>

<script>
// =============================================================================
// DATA STORE
// Each entry in `experiments` defines one tab.
// tables: array of { title, meta, cols, rows, notes }
//   cols: array of column header strings
//   rows: array of arrays (values); prefix a value with "!" to style as .num
// =============================================================================
const experiments = [

  // --------------------------------------------------------------------------
  {
    id: "validation",

          ["Repulsion+noise", "alpha=0, v0=0, high eta=30",  "Fluid, Phi~0", "Disordered, Phi=0.00",  "PASS"],

  // --------------------------------------------------------------------------

    id: "eq_speed",
    label: "Equil. Speed",

    tables: [

        title: "Predicted vs Measured Cruise Speed",
        meta: "v0=1.0, mu=10.0. N=350, ramp=0.5, 5 seeds each.",

  // --------------------------------------------------------------------------
  {

    label: "Param Sweeps",
    desc: "Findings 2–4: repulsion-only solid/fluid, flock formation threshold, noise robustness (analysis.py).",
    tables: [

        title: "Sweep A: Repulsion-only KE vs Noise (alpha=0, v0=0)",

        cols: ["N", "Fraction in threat range"],
        rows: [

          ["25",  "0.21"],
          ["50",  "0.19"],
          ["100", "0.11"],

  // --------------------------------------------------------------------------
  {

    label: "Geometry",

    tables: [

];

// =============================================================================
// RENDER
// =============================================================================
function buildTabs() {
  const bar = document.getElementById('tabBar');
  experiments.forEach((exp, i) => {
    const t = document.createElement('div');
    t.className = 'tab' + (i === 0 ? ' active' : '');
    t.textContent = exp.label;
    t.onclick = () => switchTab(i);
    bar.appendChild(t);
  });
}

function buildPanels() {
  const container = document.getElementById('panels');
  experiments.forEach((exp, i) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + i;

    let html = `
      <div class="toolbar">
        <div class="toolbar-left">
          <h2>${exp.label}</h2>
          <p>${exp.desc}</p>
        </div>
        <button class="btn" onclick="copyPanel(${i})">Copy for Google Sheets</button>
      </div>`;

    exp.tables.forEach(tbl => {
      html += `<div class="section-title">${tbl.title}</div>`;
      if (tbl.meta) html += `<div class="meta">${tbl.meta}</div>`;
      html += `<table data-exp="${i}"><thead><tr>`;
      tbl.cols.forEach(c => { html += `<th>${c}</th>`; });
      html += `</tr></thead><tbody>`;
      tbl.rows.forEach(row => {
        html += '<tr>';
        row.forEach((cell, ci) => {
          const isNum = !isNaN(cell.replace('—','')) && cell !== '' && cell !== '—';
          const cls = ci === 0 ? 'label-col' : (isNum ? 'num' : '');
          html += `<td class="${cls}">${cell}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      if (tbl.notes) html += `<div class="meta" style="margin-top:-16px;margin-bottom:24px;font-style:italic;">${tbl.notes}</div>`;
    });

    panel.innerHTML = html;
    container.appendChild(panel);
  });
}

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i === j));
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', i === j));
}

function copyPanel(i) {
  const panel = document.getElementById('panel-' + i);
  const tables = panel.querySelectorAll('table');
  if (tables.length === 1) {
    const range = document.createRange();
    range.selectNode(tables[0]);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
  } else {
    // multiple tables: copy all as tab-separated text, one blank line between
    const lines = [];
    tables.forEach(tbl => {
      tbl.querySelectorAll('tr').forEach(row => {
        lines.push([...row.cells].map(c => c.textContent.trim()).join('\t'));
      });
      lines.push('');
    });
    navigator.clipboard.writeText(lines.join('\n'));
  }
  alert(experiments[i].label + ' copied — paste into Google Sheets.');
}

buildTabs();
buildPanels();
</script>
</body>
</html>
